{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'images/fav.png' %}" rel="icon" type="image/png">
    <title>Settings</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'assets/css/icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/uikit.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/tailwind.css' %}">

    <style>
        body {
            background-color: #f0f2f5;
            background-image: linear-gradient(to bottom right, #f0f2f5, #eef2f6);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .settings-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        .page-header a {
            color: #666;
            text-decoration: none;
            font-weight: 500;
        }
        .page-header a:hover {
            color: #ffc0cb;
        }
        .settings-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 30px;
        }
        .settings-section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #ffc0cb;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 192, 203, 0.1);
        }
        .current-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .btn-save {
            background-color: #ffc0cb;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 192, 203, 0.4);
        }
        .btn-save:hover {
            background-color: #ff9eb5;
            transform: translateY(-2px);
        }
        .btn-cancel {
            background-color: transparent;
            color: #777;
            border: 1px solid #ddd;
            padding: 11px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-cancel:hover {
            background-color: #f5f5f5;
            color: #333;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            vertical-align: middle;
            margin-left: 10px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #ffc0cb;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Dark Mode Overrides */
        body.dark-mode {
            background-color: #121212;
            background-image: none;
            color: #e0e0e0;
        }
        body.dark-mode .settings-card {
            background-color: #1e1e1e;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        body.dark-mode .page-header h1,
        body.dark-mode .settings-section-title,
        body.dark-mode .form-group label {
            color: #e0e0e0;
        }
        body.dark-mode .page-header a {
            color: #aaa;
        }
        body.dark-mode .form-control {
            background-color: #2d2d2d;
            border-color: #444;
            color: #fff;
        }
        body.dark-mode .form-control:focus {
            background-color: #333;
            border-color: #ffc0cb;
        }
        body.dark-mode .btn-cancel {
            color: #aaa;
            border-color: #444;
        }
        body.dark-mode .btn-cancel:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>

<body>


    <div class="settings-container">
        <div class="page-header">
            <h1><a href="/"><i class="fa fa-home"></i> Home</a> / Account Settings for <b>{{user.username}}</b></h1>
        </div>

        <div class="settings-card">
            <h3 class="settings-section-title">General Information</h3>
            
            <form action="" method="POST" enctype="multipart/form-data"> 
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="">Profile Image</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img class="current-avatar" src="{{user_profile.profileimg.url}}" alt="Current Profile Image"/>
                        <input type="file" name="image" class="form-control" style="padding: 8px;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="about">Bio</label>  
                    <textarea id="about" name="bio" rows="4" class="form-control" placeholder="Tell us about yourself...">{{user_profile.bio}}</textarea>
                </div> 
                
                <div class="form-group">
                    <label for="">Location</label>
                    <input type="text" name="location" value="{{user_profile.location}}" class="form-control" placeholder="Where are you based?">
                </div>

                <div class="form-group" style="display: flex; align-items: center;">
                    <label for="dark-mode-toggle" style="margin-bottom: 0;">Dark Mode</label>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                    <a href="/" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </div>

        <div class="settings-card" style="margin-top: 20px;">
            <h3 class="settings-section-title">Change Password</h3>
            <form action="/change-password/" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="old_password">Current Password</label>
                    <input type="password" name="old_password" class="form-control" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
                </div>
                <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                    <button type="submit" class="btn-save">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    

 <!-- Scripts
    ================================================== -->
    <script src="{% static 'assets/js/tippy.all.min.js' %}"></script>  
    <script src="{% static 'assets/js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'assets/js/uikit.js' %}"></script>
    <script src="{% static 'assets/js/simplebar.js' %}"></script>
    <script src="{% static 'assets/js/custom.js' %}"></script>

    <script>
        const toggleSwitch = document.querySelector('#dark-mode-toggle');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.body.classList.add(currentTheme);
            if (currentTheme === 'dark-mode') {
                toggleSwitch.checked = true;
            }
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light-mode');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
    </script>

    <script src="https://unpkg.com/ionicons@5.2.3/dist/ionicons.js"></script>
</body>

</html>
