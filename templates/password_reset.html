{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/tailwind.css' %}">
</head>
<body class="bg-gray-100">
    <div class="container m-auto mt-10 max-w-md">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-semibold mb-6 text-center">Reset Password</h2>
            <p class="mb-4 text-gray-600 text-sm">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <input type="email" name="email" id="email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                        Send Reset Link
                    </button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <a href="/signin" class="text-sm text-blue-500 hover:text-blue-700">Back to Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
